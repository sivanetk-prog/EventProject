<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - อีเวนต์ฮับ</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>อีเวนต์ฮับ</h1>
            <p class="auth-subtitle">สร้างบัญชีผู้ใช้และบันทึกลงฐานข้อมูล</p>

            <form id="register-form">
                <input type="text" id="user_name" placeholder="ชื่อผู้ใช้" required>
                <input type="email" id="user_email" placeholder="อีเมลผู้ใช้" required autocomplete="username">
                <input type="text" id="user_phone" placeholder="เบอร์โทรศัพท์ (ไม่บังคับ)">
                <input type="password" id="user_password" placeholder="รหัสผ่าน" required autocomplete="new-password">
                <button type="submit" class="btn primary">สมัครสมาชิก</button>
            </form>

            <div class="auth-links">
                <p class="auth-link-note">
                    มีบัญชีแล้ว?
                    <a href="login.html" class="auth-link">เข้าสู่ระบบ</a>
                </p>
                <p class="auth-back-link">
                    <a href="index.html" class="auth-link">กลับไปหน้าหลัก</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/dialog.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
