version: '3.8'

services:
  db:
    image: mysql:8.4
    container_name: event_management_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_management
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - event_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: event_management_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - event_network

networks:
  event_network:
    driver: bridge

volumes:
  db_data:
    driver: local